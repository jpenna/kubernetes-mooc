apiVersion: apps/v1
kind: Deployment
metadata:
  name: ping-dep
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ping
  template:
    metadata:
      labels:
        app: ping
    spec:
      containers:
        - name: ping
          imagePullPolicy: IfNotPresent
          image: ping:v2
