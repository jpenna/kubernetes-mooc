apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: project
  name: todo-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo-backend
  template:
    metadata:
      labels:
        app: todo-backend
    spec:
      containers:
        - name: todo-backend
          imagePullPolicy: IfNotPresent
          image: todo-backend:v1
          env:
            - name: PORT
              value: "3000"
            - name: SECRET
              valueFrom:
                secretKeyRef:
                  name: pixabay-apikey
                  key: SECRET_IN_ENV # key inside the secret
          envFrom:
            - secretRef:
                name: todo-apikey # API
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
